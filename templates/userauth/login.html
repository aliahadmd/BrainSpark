{% extends "_base.html" %}
{% load static %}
{% block content %}
    <div class="blog_container">
        <h2>Login</h2>
        <form method="post">
            {% csrf_token %}
            <div>
                <label for="logemail">Enter your Email:</label>
                <input type="text"
                       required
                       name="email"
                       id="logemail"
                       placeholder="Enter Your Email">
                {% for error in form.email.errors %}<span class="error">{{ error }}</span>{% endfor %}
            </div>
            <div class="single-input">
                <label for="logemail">Enter your Password:</label>
                <input type="password"
                       required
                       name="password"
                       id="logemail"
                       placeholder="Enter Your Password">
                {% for error in form.password.errors %}<span class="error">{{ error }}</span>{% endfor %}
            </div>
            <div>
                <button type="submit">Login</button>
            </div>
        </form>
    </div>
{% endblock content %}
